<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DTU Studio | Web Design & Tech</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='70' height='70' x='15' y='15' rx='6' fill='white' transform='rotate(45 50 50)'/></svg>">
    <!-- Inline theme bootstrap: runs synchronously before React mounts to prevent flash -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dtu-theme');
          if (saved === 'light') {
            document.documentElement.classList.add('light');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
